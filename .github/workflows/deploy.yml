name: Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build]
  schedule:
    - cron: "0 0 * * *"
  push:
  pull_request:

# ADD THIS SECTION HERE
permissions:
  contents: write    # Required to push changes to the repo
  pages: write       # Required if deploying to GH Pages
  id-token: write    # Required for certain security features

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Build
      shell: bash -l {0}
      run: |
        pip install jinja2 requests pandas
        # Note: If your script needs to PUSH, ensure GH_TOKEN has enough scope
        python .ci_support/run.py --username ${{ github.actor }} --token ${{ secrets.GH_TOKEN }} --githubrepo ${{ github.repository }} 
        cp .ci_support/readmetemplate.md README.md 
        cat packages.md >> README.md
    - name: Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@v4.6.1
      with:
        branch: main   # Be careful! You are pushing back to the branch you are running on.
        folder: .
